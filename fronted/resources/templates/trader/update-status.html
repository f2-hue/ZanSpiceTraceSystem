<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Batch Status - SpiceChain Zanzibar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="navbar">
    <span class="navbar-brand">SpiceChain Zanzibar</span>
    <div>
        <a th:href="@{/trader/dashboard}">Dashboard</a>
        <a th:href="@{/trader/batch/search}">Search Batch</a>
        <a th:href="@{/verify}">Verify Batch</a>
        <a th:href="@{/logout}">Logout</a>
    </div>
</div>

<div class="container">
    <h2 style="margin-bottom: 20px;">Update Batch Status</h2>

    <!-- Current Batch Info -->
    <div class="card">
        <div class="card-header">
            Batch: <span th:text="${batch.referenceCode}"></span>
        </div>
        <table>
            <tr>
                <th style="width: 200px;">Reference Code</th>
                <td th:text="${batch.referenceCode}"></td>
            </tr>
            <tr>
                <th>Farm</th>
                <td th:text="${batch.farm.farmName}"></td>
            </tr>
            <tr>
                <th>Spice Type</th>
                <td th:text="${batch.spiceType}"></td>
            </tr>
            <tr>
                <th>Quantity (kg)</th>
                <td th:text="${batch.quantityKg}"></td>
            </tr>
            <tr>
                <th>Current Status</th>
                <td>
                    <span th:class="'badge badge-' +
                          ${batch.currentStatus.toLowerCase()}"
                          th:text="${batch.currentStatus}"></span>
                </td>
            </tr>
        </table>
    </div>

    <!-- Update Form -->
    <div class="card">
        <div class="card-header">Update Status</div>

        <form th:action="@{/trader/batch/{id}/update(id=${batch.id})}"
              method="post">

            <div class="form-group">
                <label>New Status</label>
                <select name="newStatus" required>
                    <option value="">-- Select New Status --</option>
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Notes (optional)</label>
                <textarea name="notes" rows="4"
                          placeholder="Add any notes about this update..."></textarea>
            </div>

            <div style="margin-top: 10px;">
                <button type="submit" class="btn btn-dark">
                    Update Status
                </button>
                &nbsp;
                <a th:href="@{/trader/dashboard}"
                   class="btn btn-dark">Cancel</a>
            </div>

        </form>
    </div>

</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
