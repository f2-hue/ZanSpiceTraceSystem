<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users - SpiceChain Zanzibar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="navbar">
    <span class="navbar-brand">SpiceChain Zanzibar</span>
    <div>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/admin/batches}">Batches</a>
        <a th:href="@{/admin/messages}">Messages</a>
        <a th:href="@{/verify}">Verify Batch</a>
        <a th:href="@{/logout}">Logout</a>
    </div>
</div>

<div class="container">
    <h2 style="margin-bottom: 20px;">All Users</h2>

    <div th:if="${param.approved}" class="alert alert-success">
        User approved successfully.
    </div>
    <div th:if="${param.suspended}" class="alert alert-warning">
        User suspended successfully.
    </div>
    <div th:if="${param.activated}" class="alert alert-success">
        User activated successfully.
    </div>
    <div th:if="${param.deleted}" class="alert alert-danger">
        User deleted successfully.
    </div>

    <div class="card">
        <div class="card-header">User Management</div>

        <div th:if="${#lists.isEmpty(users)}"
             style="padding: 15px; color: #666;">
            No users found.
        </div>

        <table th:if="${!#lists.isEmpty(users)}">
            <thead>
            <tr>
                <th>#</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Registered</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user, stat : ${users}">
                <td th:text="${stat.count}"></td>
                <td th:text="${user.fullName}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.role}"></td>
                <td>
                        <span th:class="'badge badge-' +
                              ${user.status.toLowerCase()}"
                              th:text="${user.status}"></span>
                </td>
                <td th:text="${user.createdAt != null ?
                                  user.createdAt : '-'}"></td>
                <td>
                    <!-- Approve -->
                    <form th:if="${user.status == 'PENDING'}"
                          th:action="@{/admin/users/{id}/approve(id=${user.id})}"
                          method="post" style="display:inline;">
                        <button type="submit"
                                class="btn btn-success btn-sm">
                            Approve
                        </button>
                    </form>

                    <!-- Suspend -->
                    <form th:if="${user.status == 'ACTIVE'}"
                          th:action="@{/admin/users/{id}/suspend(id=${user.id})}"
                          method="post" style="display:inline;">
                        <button type="submit"
                                class="btn btn-danger btn-sm"
                                onclick="return confirmAction('Suspend this user?')">
                            Suspend
                        </button>
                    </form>

                    <!-- Activate -->
                    <form th:if="${user.status == 'SUSPENDED'}"
                          th:action="@{/admin/users/{id}/activate(id=${user.id})}"
                          method="post" style="display:inline;">
                        <button type="submit"
                                class="btn btn-success btn-sm"
                                onclick="return confirmAction('Activate this user?')">
                            Activate
                        </button>
                    </form>

                    &nbsp;

                    <!-- Delete -->
                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                          method="post" style="display:inline;">
                        <button type="submit"
                                class="btn btn-danger btn-sm"
                                onclick="return confirmAction('Delete this user permanently?')">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
